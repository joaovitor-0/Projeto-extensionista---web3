<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<title>GAVIME - Grupo de Apoio Viver Melhor</title>
		<meta charset = 'UTF-8'>
		<link rel = 'stylesheet' href = 'style.css'>
		<link rel = 'icon' href = 'icon.ico'>
		<meta name = 'viewport' content = 'width=device-width, initial-scale=1.0'>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	</head>
<body id="topo">
	<header>
		<div class = 'cabecalho'>
			<a href = 'index.html'>
				<img src = 'logoGavime.png' class = 'logo' alt = 'Logo GAVIME'>
			</a>
            <nav>
                <a href = 'index.html'>Apresentações</a>
				<a href = 'doacoes.html'>Doações</a>
				<a href = 'transparencia.html'>Transparência</a>
	    		<a href = 'contato.html'>Contato</a>
                <a href = 'inscricao.html'>Seja Voluntário</a>
			</nav>
		</div>
	</header>
    <section class="secaoInscricao">
        <div class="containerInscricao">

            <div class="formularioInscricao">
                <h2>Seja um Voluntário!</h2>

                <form method="POST" action="{% url 'inscricao' %}">

                    <div class="campo">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>

                    <div class="campo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="campo">
                        <label for="telefone">Telefone:</label>
                        <input type="text" id="telefone" name="telefone">
                    </div>

                    <button type="submit" class="botaoEnviar">Enviar Inscrição</button>
                </form>
            </div>
        </div>
    </section>
<footer>
		<div class="footerContainer">
			<div class="footerLogo">
				<a href="#topo">
					<img src="logoGavime.png"
					class="logoFooter"
					alt="Logo GAVIME">
				</a>
			</div>
			<p class="direitos">
				©2026 - GAVIME. Todos os direitos reservados.
			</p>
			<div class="redes">

				target="_blank">

				</a>
				<a href="https://www.linkedin.com/"
				target="_blank">
					<i class="fa-brands fa-linkedin"></i>
				</a>
				<a href="https://www.youtube.com/"
				target="_blank">
					<i class="fa-brands fa-youtube"></i>
				</a>
				<a href="https://www.instagram.com/gavime.ong/reels/"
				target="_blank">
					<i class="fa-brands fa-instagram"></i>
				</a>
			</div>
		</div>
	</footer>
</body>
</html>
